# =============================================================================
# Moodle 4.5 Stable - Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d --build
#   Access: http://localhost:8080
#   Admin:  admin / Admin@1234
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Moodle Application
  # ---------------------------------------------------------------------------
  moodle:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moodle_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      MOODLE_DB_TYPE: mariadb
      MOODLE_DB_HOST: db
      MOODLE_DB_PORT: "3306"
      MOODLE_DB_NAME: moodle
      MOODLE_DB_USER: moodle
      MOODLE_DB_PASS: ${MOODLE_DB_PASS:-moodle_secure_pass}
      MOODLE_DB_PREFIX: mdl_
      MOODLE_URL: ${MOODLE_URL:-http://localhost:8080}
      MOODLE_ADMIN_USER: admin
      MOODLE_ADMIN_PASS: ${MOODLE_ADMIN_PASS:-Admin@1234}
      MOODLE_ADMIN_EMAIL: admin@example.com
      MOODLE_FULLNAME: "Moodle 4.5 LMS"
      MOODLE_SHORTNAME: "Moodle"
      MOODLE_DATA: /var/www/moodledata
    volumes:
      - ./moodle:/var/www/html/moodle
      - ./moodledata:/var/www/moodledata
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moodle_net

  # ---------------------------------------------------------------------------
  # MariaDB Database
  # ---------------------------------------------------------------------------
  db:
    image: mariadb:11.4
    container_name: moodle_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secure_pass}
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: ${MOODLE_DB_PASS:-moodle_secure_pass}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-file-per-table=1
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --max-allowed-packet=256M
      --wait-timeout=28800
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - moodle_net

  # ---------------------------------------------------------------------------
  # Redis (Session & Cache Store) - Optional but recommended
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: moodle_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - moodle_net

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Network
# ---------------------------------------------------------------------------
networks:
  moodle_net:
    driver: bridge
